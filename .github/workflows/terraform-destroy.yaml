name: Terraform Destroy

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform Destroy
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # Terraform Init
      - name: Terraform Init
        run: |
          cd Intellect_Hub_Terraform_Script
          terraform init

      # Terraform Destroy
      - name: Terraform Destroy
        run: |
          cd Intellect_Hub_Terraform_Script
          terraform destroy -auto-approve