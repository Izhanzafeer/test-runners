name: Terraform Apply

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🔥 ADD THIS (IMPORTANT)
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 2️⃣ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 3️⃣ Terraform Format Check
      - name: Terraform Format Check
        run: terraform -chdir=Intellect_Hub_Terraform_Script fmt -check

      # 4️⃣ Terraform Init
      - name: Terraform Init
        run: terraform -chdir=Intellect_Hub_Terraform_Script init

      # 5️⃣ Terraform Validate
      - name: Terraform Validate
        run: terraform -chdir=Intellect_Hub_Terraform_Script validate

      # 6️⃣ Terraform Plan
      - name: Terraform Plan
        run: terraform -chdir=Intellect_Hub_Terraform_Script plan

      # 🔥 ADD APPLY (you missed this too)
      - name: Terraform Apply
        run: terraform -chdir=Intellect_Hub_Terraform_Script apply -auto-approve
